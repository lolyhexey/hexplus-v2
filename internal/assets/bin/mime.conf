# Squid MIME type table (placeholder - replaced by Docker build in CI).
# Format: type encoding [content-type [content-encoding [x-gzip-compat]]]
# See squid.conf mime_table directive.

# Compressed
.gz		application/x-gzip	gzip
.bz2		application/x-bzip2	x-bzip2
.Z		application/x-compress	compress

# Archives
.tar		application/x-tar	-
.zip		application/zip		-

# Documents / web
.html		text/html		-
.htm		text/html		-
.css		text/css		-
.js		application/javascript	-
.json		application/json	-
.xml		text/xml		-
.txt		text/plain		-

# Images
.png		image/png		-
.jpg		image/jpeg		-
.gif		image/gif		-
.ico		image/x-icon		-

# Binary / octet
.bin		application/octet-stream	-
